name: Auto Merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Merge verified automation pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: headSha,
              per_page: 100,
            });

            const candidates = associated.data.filter((pr) =>
              pr.state === "open" &&
              pr.base.ref === "main" &&
              pr.head.repo?.full_name === `${owner}/${repo}` &&
              !pr.draft &&
              /^AUTO_MERGE: true$/m.test(pr.body || "")
            );

            if (candidates.length === 0) {
              core.info("No eligible automation Pull Request for this CI run.");
              return;
            }

            if (candidates.length > 1) {
              core.setFailed("More than one eligible Pull Request is associated with the same commit.");
              return;
            }

            const pr = candidates[0];
            let vercelReady = false;

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const checks = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const statuses = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              });

              const vercelChecks = checks.data.check_runs.filter((check) =>
                /vercel/i.test(`${check.name} ${check.app?.name || ""}`)
              );
              const vercelStatuses = statuses.data.statuses.filter((status) =>
                /vercel/i.test(status.context || "")
              );

              const vercelFailure =
                vercelChecks.some((check) =>
                  ["failure", "cancelled", "timed_out", "action_required"].includes(check.conclusion)
                ) ||
                vercelStatuses.some((status) => ["failure", "error"].includes(status.state));

              if (vercelFailure) {
                core.setFailed(`Vercel Preview failed for PR #${pr.number} at ${headSha}.`);
                return;
              }

              vercelReady =
                vercelChecks.some((check) => check.conclusion === "success") ||
                vercelStatuses.some((status) => status.state === "success");

              if (vercelReady) {
                break;
              }

              core.info(`Waiting for Vercel Preview (${attempt}/30)...`);
              await new Promise((resolve) => setTimeout(resolve, 20000));
            }

            if (!vercelReady) {
              core.setFailed(`Vercel Preview did not succeed within the timeout for PR #${pr.number}.`);
              return;
            }

            const latest = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });

            if (latest.data.head.sha !== headSha) {
              core.setFailed("Pull Request head changed after CI. A new CI run must validate the new head.");
              return;
            }

            if (latest.data.mergeable === false) {
              core.setFailed(`PR #${pr.number} is not mergeable.`);
              return;
            }

            const result = await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              sha: headSha,
              merge_method: "squash",
              commit_title: `${pr.title} (#${pr.number})`,
            });

            if (!result.data.merged) {
              core.setFailed(result.data.message || `GitHub did not merge PR #${pr.number}.`);
              return;
            }

            core.info(`Merged PR #${pr.number} after CI and Vercel Preview succeeded.`);
